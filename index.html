<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moukaddem.com</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    color: #f5efe1;
    background: #0d0a12 url('royal-placeholder.png') center 35% / cover no-repeat fixed;
  }

  .overlay {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8vh 6vw;
    background: linear-gradient(180deg, rgba(13,10,18,0.55), rgba(13,10,18,0.35) 45%, rgba(13,10,18,0.7));
  }

  h1 {
    font-weight: 600;
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    line-height: 1;
    color: #f5efe1;
    text-shadow: 0 2px 30px rgba(0,0,0,0.7);
  }

  h1 span { font-style: italic; color: #e8cf8a; }

  .lede {
    font-style: italic;
    font-size: clamp(1.4rem, 4vw, 2.1rem);
    color: #e8cf8a;
    margin-top: 1.4rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
  }

  .note {
    font-size: clamp(1.05rem, 2.4vw, 1.3rem);
    color: #f5efe1;
    opacity: 0.9;
    margin-top: 1rem;
    text-shadow: 0 1px 14px rgba(0,0,0,0.8);
  }

  .soon {
    margin-top: 3rem;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #e8cf8a;
    text-shadow: 0 1px 14px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
  <div class="overlay">
    <h1>Moukaddem<span>.com</span></h1>
    <p class="lede">A legacy in the making</p>
    <p class="note">This page is a placeholder while the site is being built.</p>
    <p class="soon">Coming Soon</p>
  </div>
</body>
</html>
